<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CLASSIFIED — Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --red:     #e63232;
  --red-dim: #8b1515;
  --green:   #00e676;
  --amber:   #ffab00;
  --text:    #f0ece0;
  --muted:   #888;
  --mono:    'Courier Prime', monospace;
  --sans:    'Oswald', sans-serif;
}
html, body {
  background:#000; color:var(--text); font-family:var(--sans);
  height:100%; overflow:hidden;
  touch-action:manipulation; overscroll-behavior:none;
}
#bg { position:fixed; inset:0; z-index:0; opacity:0.18; pointer-events:none; }

/* ═══ SCREENS ═══ */
.screen { display:none; position:fixed; inset:0; z-index:10; flex-direction:column; }
.screen.active { display:flex; }

/* ═══ LOGIN ═══ */
#s-login {
  align-items:center; justify-content:center;
  padding: max(40px,env(safe-area-inset-top)) 32px max(40px,env(safe-area-inset-bottom));
}
.login-inner { display:flex; flex-direction:column; align-items:center; gap:20px; width:100%; max-width:380px; }
.login-alert {
  font-family:var(--mono); font-size:10px; letter-spacing:0.3em; color:var(--red);
  text-transform:uppercase; text-align:center; border:1px solid var(--red-dim);
  padding:6px 16px; border-radius:2px;
}
.login-heading { font-size:13px; letter-spacing:0.35em; font-family:var(--mono); color:var(--muted); text-transform:uppercase; text-align:center; }
.login-title   { font-size:36px; font-weight:700; letter-spacing:0.15em; text-align:center; color:#fff; text-transform:uppercase; line-height:1; }
.login-sub     { font-family:var(--mono); font-size:11px; letter-spacing:0.15em; color:var(--muted); text-align:center; text-transform:uppercase; }
.login-divider { width:100%; height:1px; background:#1a1a1a; }
.team-input {
  width:100%; text-align:center; text-transform:uppercase;
  background:#0a0a0a; border:1.5px solid #2a2a2a; border-radius:4px;
  font-family:var(--sans); font-size:26px; font-weight:700; letter-spacing:0.2em;
  color:#fff; padding:16px; caret-color:var(--red);
}
.team-input:focus { outline:none; border-color:var(--red); }
.login-error { font-family:var(--mono); font-size:11px; color:var(--red); text-align:center; letter-spacing:0.08em; min-height:16px; }
.btn-enter {
  width:100%; padding:17px; background:var(--red); color:#fff; border:none;
  border-radius:3px; font-family:var(--sans); font-size:17px; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase; cursor:pointer;
}
.btn-enter:hover { background:#c02020; }

/* ═══ DISARM ═══ */
#s-disarm { padding-top:max(0px,env(safe-area-inset-top)); padding-bottom:max(0px,env(safe-area-inset-bottom)); }
.d-topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; border-bottom:1px solid #111; flex-shrink:0;
}
.d-team   { font-family:var(--mono); font-size:11px; letter-spacing:0.2em; color:var(--red); text-transform:uppercase; }
.d-status { display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:9px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; }
.d-dot    { width:6px; height:6px; border-radius:50%; background:var(--red); animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.d-body { flex:1; display:flex; flex-direction:column; min-height:0; }
@media(min-width:680px){ .d-body{ flex-direction:row; } }

.d-timer-panel {
  flex-shrink:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:28px 24px 20px; border-bottom:1px solid #0d0d0d;
}
@media(min-width:680px){ .d-timer-panel{ flex:1; border-bottom:none; border-right:1px solid #0d0d0d; padding:40px; } }

.d-timer-label { font-family:var(--mono); font-size:9px; letter-spacing:0.3em; color:#2a2a2a; text-transform:uppercase; margin-bottom:10px; }
.d-timer {
  font-family:var(--mono); font-size:clamp(40px,10vw,68px); font-weight:700;
  color:#fff; letter-spacing:0.04em; line-height:1;
}
.d-timer .d-ms { font-size:clamp(22px,5vw,36px); color:#333; }
.d-timer.warn  { color:var(--amber); }
.d-timer.warn .d-ms { color:#6a4400; }
.d-timer-rule  { width:100%; height:1px; background:linear-gradient(to right,transparent,#1a0000,transparent); margin-top:14px; }

.d-code-panel {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:24px 28px; gap:16px;
}
.d-code-label { font-family:var(--mono); font-size:10px; letter-spacing:0.25em; color:#2a2a2a; text-transform:uppercase; }
.d-digits { display:flex; gap:10px; justify-content:center; }
.d-box {
  width:clamp(56px,13vw,80px); height:clamp(68px,16vw,92px);
  background:#070707; border:1.5px solid #1a1a1a; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:clamp(30px,8vw,44px); font-weight:700;
  color:#fff; transition:all 0.1s;
}
.d-box.cursor { border-color:var(--red); color:var(--red); }
.d-box.filled { border-color:#2a2a2a; color:#fff; }
.d-box.error  { border-color:var(--red); color:var(--red); background:#120000; }
.d-hidden { position:absolute; opacity:0; pointer-events:none; width:1px; height:1px; }

.d-lockbar-wrap { width:100%; max-width:380px; height:4px; background:#111; border-radius:2px; overflow:hidden; display:none; }
.d-lockbar      { height:100%; background:var(--red); border-radius:2px; transition:width linear; }
.d-lockmsg      { font-family:var(--mono); font-size:11px; letter-spacing:0.15em; color:var(--red); text-transform:uppercase; text-align:center; min-height:16px; }

.d-btn-row { display:flex; gap:10px; width:100%; max-width:380px; }
.btn-disarm {
  flex:2; padding:16px; background:transparent; border:1.5px solid #2a2a2a;
  border-radius:3px; font-family:var(--sans); font-size:16px; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase; color:#333; cursor:pointer; transition:all 0.12s;
}
.btn-disarm.ready        { border-color:var(--red); color:var(--red); }
.btn-disarm.ready:hover  { background:rgba(230,50,50,0.06); }
.btn-disarm:disabled     { opacity:0.3; cursor:not-allowed; }
.btn-cancel {
  flex:1; padding:16px; background:transparent; border:1.5px solid #1a1a1a;
  border-radius:3px; font-family:var(--sans); font-size:14px; font-weight:600;
  letter-spacing:0.1em; text-transform:uppercase; color:#333; cursor:pointer;
}
.btn-cancel:hover { color:var(--muted); border-color:#333; }

/* ═══ SUCCESS ═══ */
#s-success {
  background:#000; align-items:center; justify-content:center;
  padding:40px 32px; flex-direction:column; gap:0;
}
.success-bg    { position:absolute; inset:0; background:radial-gradient(ellipse at center,rgba(0,230,118,0.08) 0%,transparent 65%); animation:sglow 2.5s ease-in-out infinite; }
.success-frame { position:absolute; inset:16px; border:1px solid rgba(0,230,118,0.12); border-radius:4px; pointer-events:none; }
@keyframes sglow { 0%,100%{opacity:.5} 50%{opacity:1} }
.success-inner { display:flex; flex-direction:column; align-items:center; gap:18px; z-index:1; text-align:center; width:100%; max-width:400px; }
.s-line { font-family:var(--mono); opacity:0; transform:translateY(12px); animation:fup .5s ease forwards; }
@keyframes fup { to{opacity:1;transform:translateY(0)} }
.s-micro { font-size:9px; letter-spacing:0.35em; color:#222; text-transform:uppercase; }
.s-main  { font-size:clamp(26px,7vw,40px); font-weight:700; letter-spacing:0.2em; color:var(--green); text-transform:uppercase; }
.s-sub   { font-size:13px; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase; }
.s-team  { font-size:18px; font-weight:600; letter-spacing:0.2em; color:#fff; }
.s-time  { font-size:22px; font-weight:700; letter-spacing:0.06em; color:var(--green); font-family:var(--mono); }
.s-note  { font-size:10px; letter-spacing:0.1em; color:#222; }

/* Next team button — appears after success */
.btn-next-team {
  margin-top:12px; padding:15px 36px;
  background:transparent; border:1.5px solid #2a2a2a;
  border-radius:3px; font-family:var(--sans); font-size:15px; font-weight:700;
  letter-spacing:0.1em; text-transform:uppercase; color:#444;
  cursor:pointer; transition:all 0.15s;
  opacity:0; animation:fup 0.5s ease forwards;
}
.btn-next-team:hover { border-color:var(--red); color:var(--red); }

/* ═══ CONNECTING ═══ */
.con-overlay {
  position:fixed; inset:0; z-index:200; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:18px; padding:40px; opacity:0; pointer-events:none; transition:opacity .3s;
}
.con-overlay.on { opacity:1; pointer-events:auto; }
.con-label  { font-family:var(--mono); font-size:10px; letter-spacing:0.2em; color:var(--red); text-transform:uppercase; text-align:center; }
.con-track  { width:100%; height:2px; background:#111; border-radius:2px; overflow:hidden; }
.con-fill   { height:100%; width:0; background:var(--red); transition:width .4s ease; }
.con-status { font-family:var(--mono); font-size:10px; letter-spacing:0.1em; color:#333; text-align:center; min-height:14px; }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- LOGIN -->
<div class="screen active" id="s-login">
  <div class="login-inner">
    <div class="login-alert">⚠ Restricted Access — Authorised Personnel Only</div>
    <div class="login-heading">Operation Blackout · Final Phase</div>
    <div class="login-title">Disarm Terminal</div>
    <div class="login-sub">Operative identification required</div>
    <div class="login-divider"></div>
    <input class="team-input" id="team-input" type="text" placeholder="TEAM A"
           autocomplete="off" autocapitalize="characters" spellcheck="false"
           oninput="this.value=this.value.toUpperCase()"
           onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="login-err"></div>
    <button class="btn-enter" onclick="doLogin()">Confirm Identity</button>
  </div>
</div>

<!-- DISARM -->
<div class="screen" id="s-disarm">
  <div class="d-topbar">
    <div class="d-team" id="d-team-label">—</div>
    <div class="d-status"><div class="d-dot"></div>ARMED</div>
  </div>
  <div class="d-body">
    <div class="d-timer-panel">
      <div class="d-timer-label">Mission Elapsed</div>
      <div class="d-timer" id="d-timer">
        <span id="d-t-main">00:00</span><span class="d-ms">.<span id="d-t-ms">000</span></span>
      </div>
      <div class="d-timer-rule"></div>
    </div>
    <div class="d-code-panel">
      <div class="d-code-label">Enter Disarm Code</div>
      <div class="d-digits" onclick="focusCode()">
        <div class="d-box cursor" id="db0">_</div>
        <div class="d-box" id="db1">_</div>
        <div class="d-box" id="db2">_</div>
        <div class="d-box" id="db3">_</div>
      </div>
      <input class="d-hidden" id="code-hidden" type="tel" maxlength="4" inputmode="numeric"
             oninput="onCodeIn(this.value)" onkeydown="onCodeKey(event)">
      <div class="d-lockbar-wrap" id="lockbar-wrap"><div class="d-lockbar" id="lockbar"></div></div>
      <div class="d-lockmsg" id="lockmsg"></div>
      <div class="d-btn-row">
        <button class="btn-disarm" id="btn-disarm" onclick="submitCode()" disabled>Disarm Device</button>
        <button class="btn-cancel" onclick="doCancel()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- SUCCESS -->
<div class="screen" id="s-success">
  <div class="success-bg"></div>
  <div class="success-frame"></div>
  <div class="success-inner" id="success-inner"></div>
</div>

<!-- CONNECTING -->
<div class="con-overlay" id="con-overlay">
  <div class="con-label">Establishing encrypted link...</div>
  <div class="con-track"><div class="con-fill" id="con-fill"></div></div>
  <div class="con-status" id="con-status">Authenticating...</div>
</div>

<script src="assets/js/firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
'use strict';

/* ── BG CANVAS ── */
(function(){
  const cv=document.getElementById('bg'), cx=cv.getContext('2d');
  const CH='0123456789ABCDEF:/\\|[]{}<>!?%$#';
  let cols,drops,fs=12;
  function resize(){ cv.width=window.innerWidth; cv.height=window.innerHeight; cols=Math.floor(cv.width/fs); drops=Array(cols).fill(1); }
  resize(); window.addEventListener('resize',resize);
  setInterval(()=>{
    cx.fillStyle='rgba(0,0,0,0.06)'; cx.fillRect(0,0,cv.width,cv.height);
    cx.font=fs+'px Courier Prime,monospace';
    for(let i=0;i<cols;i++){
      cx.fillStyle=Math.random()<.015?'rgba(230,50,50,0.6)':'rgba(230,50,50,0.06)';
      cx.fillText(CH[Math.floor(Math.random()*CH.length)],i*fs,drops[i]*fs);
      if(drops[i]*fs>cv.height&&Math.random()>.975)drops[i]=0;
      drops[i]++;
    }
  },80);
})();

/* ── FIREBASE ── */
firebase.initializeApp(SHADE_FIREBASE_CONFIG);
const db = firebase.database();
const SR = db.ref('shade/session');
const TR = db.ref('shade/teams');

let S={}, myTeam=null, teamData={}, tickInt=null, lockInt=null, codeBuf='';
let teamListener = null;

SR.on('value', snap => {
  S = snap.val() || {};
  if (S.isRunning && !S.isPaused && !tickInt) startTick();
  if (!S.isRunning || S.isPaused) stopTick();
});

/* ── TIMER ── */
function startTick() {
  clearInterval(tickInt);
  tickInt = setInterval(() => {
    if (!S.isRunning || !S.startedAt) return;
    const master = S.isPaused ? (S.pausedElapsed||0) : Date.now()-S.startedAt;
    const adj = master + (teamData.hintsUsed||0)*60000 + (teamData.wrongAttempts||0)*30000;
    document.getElementById('d-t-main').textContent = fmtMain(adj);
    document.getElementById('d-t-ms').textContent   = fmtMs(adj);
    document.getElementById('d-timer').className = 'd-timer'+(adj>master+30000?' warn':'');
  }, 50);
}
function stopTick() { clearInterval(tickInt); tickInt=null; }

/* ── LOGIN ── */
function doLogin() {
  const val = document.getElementById('team-input').value.trim().toUpperCase();
  const err = document.getElementById('login-err');
  err.textContent = '';
  if (!val) { err.textContent='Enter your team designation'; return; }
  const k = key(val);
  TR.child(k).once('value').then(snap => {
    const t = snap.val();
    if (!t||!t.enabled) { err.textContent='Team not recognised or not active'; return; }
    if (t.completed)    { err.textContent='This team has already completed the mission'; return; }
    myTeam=val; teamData=t;
    TR.child(k).update({ loggedIn:true });
    runConnecting(()=>enterDisarm());
  }).catch(()=>{ err.textContent='Connection error — try again'; });
}

function doCancel() {
  stopTick(); clearInterval(lockInt);
  if (myTeam && teamListener) { TR.child(key(myTeam)).off('value', teamListener); teamListener=null; }
  if (myTeam) TR.child(key(myTeam)).update({ loggedIn:false });
  myTeam=null; teamData={};
  codeBuf='';
  document.getElementById('team-input').value='';
  document.getElementById('login-err').textContent='';
  // Reset code boxes
  for(let i=0;i<4;i++){ const b=document.getElementById('db'+i); b.textContent='_'; b.className='d-box'+(i===0?' cursor':''); }
  document.getElementById('code-hidden').value='';
  document.getElementById('btn-disarm').disabled=true;
  document.getElementById('btn-disarm').className='btn-disarm';
  document.getElementById('lockbar-wrap').style.display='none';
  document.getElementById('lockmsg').textContent='';
  showScreen('s-login');
}

/* ── CONNECTING ── */
function runConnecting(cb) {
  const ov=document.getElementById('con-overlay'), f=document.getElementById('con-fill'), st=document.getElementById('con-status');
  ov.classList.add('on');
  [{p:20,t:'Verifying identity...',ms:0},{p:50,t:'Routing encrypted channel...',ms:600},{p:78,t:'Accessing mission files...',ms:1200},{p:100,t:'Link established',ms:1900}]
    .forEach(({p,t,ms})=>setTimeout(()=>{ f.style.width=p+'%'; st.textContent=t; },ms));
  setTimeout(()=>{ ov.classList.remove('on'); cb(); },2600);
}

/* ── DISARM ── */
function enterDisarm() {
  showScreen('s-disarm');
  document.getElementById('d-team-label').textContent = myTeam;
  const k = key(myTeam);
  teamListener = TR.child(k).on('value', snap => {
    teamData = snap.val()||{};
    if (teamData.completed) { stopTick(); showSuccess(); return; }
    if (teamData.lockoutUntil && Date.now()<teamData.lockoutUntil) applyLockout(teamData.lockoutUntil-Date.now());
  });
  if (S.isRunning) startTick();
  setTimeout(focusCode, 300);
}

function focusCode() {
  const el=document.getElementById('code-hidden');
  el.removeAttribute('readonly'); el.focus();
}

/* ── CODE INPUT ── */
function onCodeIn(v) {
  v=v.replace(/\D/g,'').slice(0,4);
  document.getElementById('code-hidden').value=v;
  codeBuf=v;
  renderBoxes(v,false);
  const ready=v.length===4;
  const btn=document.getElementById('btn-disarm');
  btn.disabled=!ready;
  btn.className='btn-disarm'+(ready?' ready':'');
}
function onCodeKey(e) { if(e.key==='Enter'&&codeBuf.length===4) submitCode(); }
function renderBoxes(v,err) {
  for(let i=0;i<4;i++){
    const b=document.getElementById('db'+i);
    b.textContent=v[i]||'_'; b.className='d-box';
    if(err)          b.classList.add('error');
    else if(v[i])    b.classList.add('filled');
    else if(i===v.length) b.classList.add('cursor');
  }
}

/* ── SUBMIT ── */
function submitCode() {
  if(codeBuf.length!==4||isLocked()) return;
  if(codeBuf===(S.code||'')) {
    const master=S.startedAt?Date.now()-S.startedAt:0;
    const adj=master+(teamData.hintsUsed||0)*60000+(teamData.wrongAttempts||0)*30000;
    TR.child(key(myTeam)).update({ completed:true, completedAt:Date.now(), adjustedCompletionMs:adj });
    stopTick(); showSuccess();
  } else {
    const wrong=(teamData.wrongAttempts||0)+1;
    TR.child(key(myTeam)).update({ wrongAttempts:wrong, lockoutUntil:Date.now()+10000 });
    renderBoxes(codeBuf,true);
    applyLockout(10000);
    setTimeout(()=>{ codeBuf=''; document.getElementById('code-hidden').value=''; renderBoxes('',false); document.getElementById('btn-disarm').disabled=true; document.getElementById('btn-disarm').className='btn-disarm'; },700);
  }
}

function isLocked() { return !!(teamData.lockoutUntil&&Date.now()<teamData.lockoutUntil); }

function applyLockout(dur) {
  clearInterval(lockInt);
  const inp=document.getElementById('code-hidden'), btn=document.getElementById('btn-disarm'),
        wrap=document.getElementById('lockbar-wrap'), bar=document.getElementById('lockbar'),
        msg=document.getElementById('lockmsg');
  inp.setAttribute('readonly',''); btn.disabled=true;
  wrap.style.display='block'; bar.style.transition='none'; bar.style.width='100%';
  setTimeout(()=>{ bar.style.transition='width '+dur+'ms linear'; bar.style.width='0%'; },40);
  const end=Date.now()+dur;
  lockInt=setInterval(()=>{
    const rem=end-Date.now();
    if(rem<=0){ clearInterval(lockInt); inp.removeAttribute('readonly'); wrap.style.display='none'; bar.style.width='100%'; msg.textContent=''; inp.focus(); }
    else { msg.textContent='INPUT LOCKED — '+Math.ceil(rem/1000)+'s'; }
  },100);
}

/* ── SUCCESS — shows time, then "Next Team" button to reset ── */
function showSuccess() {
  showScreen('s-success');

  // Detach team listener — this team is done
  if (myTeam && teamListener) {
    TR.child(key(myTeam)).off('value', teamListener);
    teamListener = null;
  }

  const adjMs = teamData.adjustedCompletionMs || 0;
  const completedName = myTeam;

  const lines = [
    {cls:'s-micro', text:'Operation Blackout · Final Phase',     delay:100 },
    {cls:'s-main',  text:'Mission Complete',                     delay:500 },
    {cls:'s-sub',   text:'Device Successfully Disarmed',         delay:1000},
    {cls:'s-team',  text:completedName,                          delay:1500},
    {cls:'s-time',  text:fmtFull(adjMs),                         delay:2000},
    {cls:'s-note',  text:'Time logged — stand by for debrief',   delay:2800},
  ];

  const c = document.getElementById('success-inner');
  c.innerHTML = '';
  lines.forEach(({cls,text,delay}) => {
    const el=document.createElement('div');
    el.className='s-line '+cls;
    el.textContent=text;
    el.style.animationDelay=delay+'ms';
    c.appendChild(el);
  });

  // "Next Team" button appears after 4 seconds
  setTimeout(() => {
    const btn = document.createElement('button');
    btn.className = 'btn-next-team';
    btn.textContent = '▶ Next Team';
    btn.style.animationDelay = '0ms';
    btn.onclick = resetForNextTeam;
    c.appendChild(btn);
  }, 4000);
}

function resetForNextTeam() {
  sessionStorage.removeItem('shade_team');
  myTeam=null; teamData={}; codeBuf='';
  document.getElementById('team-input').value='';
  document.getElementById('login-err').textContent='';
  for(let i=0;i<4;i++){ const b=document.getElementById('db'+i); b.textContent='_'; b.className='d-box'+(i===0?' cursor':''); }
  document.getElementById('code-hidden').value='';
  document.getElementById('btn-disarm').disabled=true;
  document.getElementById('btn-disarm').className='btn-disarm';
  document.getElementById('lockbar-wrap').style.display='none';
  document.getElementById('lockmsg').textContent='';
  document.getElementById('d-t-main').textContent='00:00';
  document.getElementById('d-t-ms').textContent='000';
  showScreen('s-login');
}

/* ── HELPERS ── */
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function key(n) { return n.replace(/ /g,'_'); }
function fmtMain(ms) {
  const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000);
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function fmtMs(ms) { return String(ms%1000).padStart(3,'0'); }
function fmtFull(ms) {
  const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000),
        s=Math.floor((ms%60000)/1000), msec=ms%1000;
  return String(h).padStart(2,'0')+'h '+String(m).padStart(2,'0')+'m '+String(s).padStart(2,'0')+'s '+String(msec).padStart(3,'0')+'ms';
}
</script>
