<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SHADE - Final Disarm</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
    body {
      font-family: 'Oswald', sans-serif;
      max-width: 420px;
      margin: 0 auto;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 24px;
    }

    /* LOGIN SCREEN */
    .login-screen {
      text-align: center;
      width: 100%;
      opacity: 1;
      transition: opacity 0.3s;
    }

    .login-screen.hidden {
      display: none;
      opacity: 0;
    }

    .login-screen h1 {
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f0ece0;
      margin-bottom: 8px;
    }

    .login-screen p {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 40px;
    }

    .team-select {
      width: 100%;
      padding: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #f0ece0;
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      border-radius: 2px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .team-select:focus {
      outline: none;
      border-color: #c9a84c;
    }

    .btn {
      padding: 12px 32px;
      background: transparent;
      border: 1px solid #333;
      color: #f0ece0;
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
    }

    .btn:active {
      border-color: #c9a84c;
      color: #c9a84c;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* DISARM SCREEN */
    .disarm-screen {
      display: none;
      text-align: center;
      width: 100%;
    }

    .disarm-screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    .team-name {
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c9a84c;
    }

    .timer {
      font-family: 'Courier Prime', monospace;
      font-size: 48px;
      font-weight: 700;
      color: #f0ece0;
      letter-spacing: 0.1em;
    }

    .code-inputs {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
    }

    .code-input {
      width: 60px;
      height: 60px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #f0ece0;
      font-family: 'Courier Prime', monospace;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      border-radius: 2px;
      transition: all 0.15s;
    }

    .code-input:focus {
      outline: none;
      border-color: #c9a84c;
      background: #252525;
    }

    .code-input.error {
      border-color: #d32f2f;
      background: #3a1a1a;
    }

    .code-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .lockout-bar {
      width: 200px;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
      margin: 12px 0;
    }

    .lockout-fill {
      height: 100%;
      background: #d32f2f;
      width: 0%;
      transition: width 0.05s linear;
    }

    .submit-btn {
      padding: 12px 48px;
      background: transparent;
      border: 1px solid #333;
      color: #f0ece0;
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
      width: 100%;
      max-width: 280px;
    }

    .submit-btn:active:not(:disabled) {
      border-color: #c9a84c;
      color: #c9a84c;
    }

    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* SUCCESS SCREEN */
    .success-screen {
      display: none;
      text-align: center;
      width: 100%;
    }

    .success-screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .success-text {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c9a84c;
      line-height: 1.6;
    }

    .success-text p {
      margin: 8px 0;
    }

    .message {
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      color: #555;
      margin-top: 12px;
    }

    @media (max-width: 480px) {
      body { padding: 16px; }
      .timer { font-size: 36px; }
      .code-input { width: 50px; height: 50px; font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <h1>SHADE</h1>
  <p>Final Disarm Terminal</p>
  <input type="text" class="team-select" id="teamInput" placeholder="Enter Team Name" autocomplete="off" style="text-transform: uppercase;">
  <button class="btn" onclick="loginTeam()">Access Terminal</button>
  <div class="message" id="loginMsg" style="color: #d32f2f;"></div>
</div>

<!-- DISARM -->
<div class="disarm-screen" id="disarmScreen">
  <div class="team-name" id="teamDisplay"></div>
  <div class="timer" id="timerDisplay">00:00</div>
  
  <div>
    <label style="font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.1em;">Enter Code</label>
    <div class="code-inputs">
      <input type="text" class="code-input" id="code0" maxlength="1" inputmode="numeric">
      <input type="text" class="code-input" id="code1" maxlength="1" inputmode="numeric">
      <input type="text" class="code-input" id="code2" maxlength="1" inputmode="numeric">
      <input type="text" class="code-input" id="code3" maxlength="1" inputmode="numeric">
    </div>
    <div class="lockout-bar" id="lockoutBar" style="display: none;">
      <div class="lockout-fill" id="lockoutFill"></div>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitCode()">Disarm</button>
  <div class="message" id="errorMsg"></div>
</div>

<!-- SUCCESS -->
<div class="success-screen" id="successScreen">
  <div class="success-text">
    <p>ACCESS GRANTED</p>
    <p>DEVICE DISARMED</p>
  </div>
  <div class="message">Mission complete</div>
</div>

<script>
const TEAMS = ['TEAM 1', 'TEAM 2', 'TEAM 3', 'TEAM 4', 'TEAM 5', 'TEAM 6', 'TEAM 7', 'TEAM 8', 'TEAM 9', 'TEAM 10', 'TEAM 11', 'TEAM 12'];
let gameState = null;
let currentTeam = null;
let timerInterval = null;
let lockoutEnd = 0;

// Get admin state from localStorage (shared)
function getAdminState() {
  const saved = localStorage.getItem('shade-admin');
  return saved ? JSON.parse(saved) : null;
}

function loginTeam() {
  const teamInput = document.getElementById('teamInput');
  const team = teamInput.value.trim().toUpperCase();
  const msgEl = document.getElementById('loginMsg');
  
  if (!team) {
    msgEl.textContent = 'Enter your team name';
    return;
  }

  if (!TEAMS.includes(team)) {
    msgEl.textContent = 'Invalid team name. Try: TEAM 1, TEAM 2, etc.';
    return;
  }

  const state = getAdminState();
  if (!state || !state.enabledTeams.includes(team)) {
    msgEl.textContent = 'Team not enabled for this session';
    return;
  }

  currentTeam = team;
  localStorage.setItem('shade-current-team', team);
  
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('disarmScreen').classList.add('active');
  document.getElementById('teamDisplay').textContent = team;
  
  startTimerUpdate();
  document.getElementById('code0').focus();
}

function startTimerUpdate() {
  const update = () => {
    const state = getAdminState();
    if (state && state.timerRunning) {
      const elapsed = Math.floor((Date.now() - state.timerStart) / 1000);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      document.getElementById('timerDisplay').textContent = 
        `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }
    requestAnimationFrame(update);
  };
  update();
}

// Code input handling
['code0', 'code1', 'code2', 'code3'].forEach((id, idx) => {
  const input = document.getElementById(id);
  input.addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '');
    if (e.target.value && idx < 3) {
      document.getElementById(`code${idx + 1}`).focus();
    }
  });
  
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !e.target.value && idx > 0) {
      document.getElementById(`code${idx - 1}`).focus();
    }
  });
});

function getCode() {
  return ['code0', 'code1', 'code2', 'code3']
    .map(id => document.getElementById(id).value)
    .join('');
}

function submitCode() {
  if (lockoutEnd > Date.now()) return;

  const code = getCode();
  const state = getAdminState();
  
  if (!state || code.length !== 4) {
    return;
  }

  if (code === state.code) {
    // Correct!
    document.getElementById('disarmScreen').classList.remove('active');
    document.getElementById('successScreen').classList.add('active');
    
    // Mark completed in state
    state.teams[currentTeam].completed = true;
    localStorage.setItem('shade-admin', JSON.stringify(state));
  } else {
    // Wrong!
    ['code0', 'code1', 'code2', 'code3'].forEach(id => {
      document.getElementById(id).classList.add('error');
      document.getElementById(id).disabled = true;
    });
    
    lockoutEnd = Date.now() + 10000;
    document.getElementById('lockoutBar').style.display = 'block';
    
    const lockout = () => {
      if (lockoutEnd > Date.now()) {
        const remaining = lockoutEnd - Date.now();
        const pct = (remaining / 10000) * 100;
        document.getElementById('lockoutFill').style.width = pct + '%';
        requestAnimationFrame(lockout);
      } else {
        ['code0', 'code1', 'code2', 'code3'].forEach(id => {
          document.getElementById(id).classList.remove('error');
          document.getElementById(id).disabled = false;
          document.getElementById(id).value = '';
        });
        document.getElementById('lockoutBar').style.display = 'none';
        document.getElementById('code0').focus();
      }
    };
    lockout();
  }
}

// Check if already logged in
const saved = localStorage.getItem('shade-current-team');
if (saved && TEAMS.includes(saved)) {
  const state = getAdminState();
  if (state && state.enabledTeams.includes(saved)) {
    currentTeam = saved;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('disarmScreen').classList.add('active');
    document.getElementById('teamDisplay').textContent = saved;
    startTimerUpdate();
  }
}

// Enter key on login
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('teamInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') loginTeam();
  });
});
</script>

</body>
</html>
