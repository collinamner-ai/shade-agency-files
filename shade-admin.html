<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADE Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:       #f4f5f6;
  --white:    #ffffff;
  --border:   #e0e2e5;
  --border2:  #c8cdd2;
  --text:     #1a1c1e;
  --muted:    #6b7280;
  --subtle:   #9ca3af;
  --navy:     #1e2533;
  --navy2:    #2d3748;
  --gold:     #c9a84c;
  --red:      #dc2626;
  --red-bg:   #fef2f2;
  --red-bdr:  #fca5a5;
  --green:    #16a34a;
  --green-bg: #f0fdf4;
  --green-bdr:#86efac;
  --blue:     #2563eb;
  --blue-bg:  #eff6ff;
  --blue-bdr: #93c5fd;
  --amber:    #d97706;
  --amber-bg: #fffbeb;
  --amber-bdr:#fcd34d;
  --mono: 'Courier Prime', monospace;
  --sans: 'Oswald', sans-serif;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: var(--navy);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-logo img {
  width: 28px;
  height: 28px;
  object-fit: contain;
  opacity: 0.9;
}

.header-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: #fff;
}

.header-sub {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--gold);
  text-transform: uppercase;
  margin-top: 1px;
}

.header-divider {
  width: 1px;
  height: 28px;
  background: rgba(255,255,255,0.1);
}

/* Universal timer in header */
.header-timer {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.05em;
  min-width: 130px;
}
.header-timer.running { color: #4ade80; }
.header-timer.paused  { color: var(--gold); }

/* Header controls */
.header-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-left: auto;
}

/* Code box */
.header-code {
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-code-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
}
.code-input {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--gold);
  width: 86px;
  text-align: center;
  padding: 6px 4px;
}
.code-input:focus { outline: none; border-color: var(--gold); }
.code-input::placeholder { color: rgba(255,255,255,0.2); }

/* ── BUTTONS ── */
.btn {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 8px 16px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.1s;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary  { background: #fff; color: var(--navy); }
.btn-primary:not(:disabled):hover { background: #e8eaed; }
.btn-outline  { background: transparent; color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.2); }
.btn-outline:not(:disabled):hover { background: rgba(255,255,255,0.08); }
.btn-danger   { background: transparent; color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
.btn-danger:not(:disabled):hover { background: rgba(220,38,38,0.1); }

/* ── MAIN ── */
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 28px 20px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ── SECTION ── */
.section-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--subtle);
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ── ADD TEAM ROW ── */
.add-team-row {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.add-team-label {
  font-size: 14px;
  font-weight: 400;
  color: var(--muted);
  margin-right: 4px;
}

.team-pill-btn {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 7px 14px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.1s;
}
.team-pill-btn:hover { border-color: var(--border2); color: var(--text); }
.team-pill-btn.active {
  background: var(--navy);
  color: #fff;
  border-color: var(--navy);
}

/* ── TEAM TABLE ── */
.team-table-wrap {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.team-table {
  width: 100%;
  border-collapse: collapse;
}

.team-table th {
  background: #f9fafb;
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  text-align: left;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--subtle);
  font-weight: 400;
}

.team-table td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.team-table tr:last-child td { border-bottom: none; }
.team-table tr:hover td { background: #fafafa; }

/* Team name cell */
.td-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--text);
  min-width: 90px;
}

/* Status badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid;
  white-space: nowrap;
}
.s-waiting   { color: var(--subtle);  border-color: var(--border);   background: var(--bg); }
.s-active    { color: var(--blue);    border-color: var(--blue-bdr); background: var(--blue-bg); }
.s-locked    { color: var(--red);     border-color: var(--red-bdr);  background: var(--red-bg); }
.s-complete  { color: var(--green);   border-color: var(--green-bdr);background: var(--green-bg); }

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.s-active  .status-dot { background: var(--blue); }
.s-locked  .status-dot { background: var(--red); animation: blink 0.8s infinite; }
.s-complete .status-dot { background: var(--green); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* Hints cell */
.hints-cell { display: flex; align-items: center; gap: 10px; }

.hint-pips { display: flex; gap: 4px; }
.hint-pip {
  width: 11px; height: 11px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: transparent;
}
.hint-pip.used  { background: var(--amber);  border-color: var(--amber); }
.hint-pip.maxed { background: var(--red);    border-color: var(--red); }

.btn-hint {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 6px 14px;
  border-radius: 5px;
  border: 1px solid var(--amber-bdr);
  background: var(--amber-bg);
  color: var(--amber);
  cursor: pointer;
  transition: all 0.1s;
  white-space: nowrap;
}
.btn-hint:not(:disabled):hover { background: #fef3c7; }
.btn-hint:disabled { opacity: 0.35; cursor: not-allowed; }

/* Hidden time */
.hidden-time {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  min-width: 100px;
}
.hidden-time.penalised { color: var(--red); }
.hidden-time.complete  { color: var(--green); }

/* Wrong attempts */
.wrong-count {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
  text-align: center;
}
.wrong-count.has-wrongs { color: var(--red); font-weight: 700; }

/* Remove button */
.btn-remove {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--subtle);
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.1s;
  line-height: 1;
}
.btn-remove:hover { border-color: var(--red-bdr); color: var(--red); background: var(--red-bg); }

/* Empty state */
.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--subtle);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* ── RESULTS PANEL ── */
.results-panel {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.results-header {
  background: #f9fafb;
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.results-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.05em;
}

.results-table {
  width: 100%;
  border-collapse: collapse;
}
.results-table th {
  background: transparent;
  padding: 8px 16px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--subtle);
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.results-table td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 13px;
  color: var(--muted);
}
.results-table tr:last-child td { border-bottom: none; }
.results-table tr.done td { color: var(--text); }
.results-table .rank-num {
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
}
.results-table .completion-time {
  color: var(--green);
  font-weight: 700;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px; right: 20px;
  background: var(--navy);
  color: #fff;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  padding: 10px 18px;
  border-radius: 6px;
  z-index: 100;
  opacity: 0;
  transform: translateY(6px);
  transition: all 0.2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">
      <img src="assets/img/shade-seal.png" alt="SHADE">
      <div>
        <div class="header-title">SHADE</div>
        <div class="header-sub">Admin Panel</div>
      </div>
    </div>

    <div class="header-divider"></div>

    <div class="header-timer" id="header-timer">00:00:00</div>

    <div class="header-controls">
      <button class="btn btn-primary" id="btn-start"  onclick="startSession()">▶ Start</button>
      <button class="btn btn-outline" id="btn-pause"  onclick="pauseSession()"  disabled>⏸ Pause</button>
      <button class="btn btn-outline" id="btn-resume" onclick="resumeSession()" style="display:none">▶ Resume</button>
      <button class="btn btn-danger"  id="btn-reset"  onclick="confirmReset()">↺ Reset</button>
    </div>
  </div>

  <div class="header-code">
    <div class="header-code-label">Code</div>
    <input class="code-input" id="code-input" type="text" maxlength="4"
           placeholder="0000"
           oninput="setCode(this.value)"
           onkeypress="return /[0-9]/.test(event.key)">
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- ADD TEAMS -->
  <div>
    <div class="section-label">Add / Remove Teams</div>
    <div class="add-team-row" id="add-team-row">
      <span class="add-team-label">Teams:</span>
      <!-- pills injected by JS -->
    </div>
  </div>

  <!-- ACTIVE TEAMS TABLE -->
  <div>
    <div class="section-label">Active Teams</div>
    <div class="team-table-wrap">
      <table class="team-table">
        <thead>
          <tr>
            <th>Team</th>
            <th>Status</th>
            <th>Hints &nbsp;<span style="font-weight:400;opacity:0.6">(+60s each)</span></th>
            <th>Wrong</th>
            <th>Adj. Time</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="team-tbody">
          <tr><td colspan="6"><div class="empty-state">No teams added yet</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-panel">
    <div class="results-header">
      <div class="results-title">Results</div>
      <button class="btn btn-outline" style="font-size:11px;padding:6px 12px;color:var(--muted);border-color:var(--border);" onclick="sortResults()">Sort by Time</button>
    </div>
    <table class="results-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Team</th>
          <th>Penalties</th>
          <th>Final Time</th>
        </tr>
      </thead>
      <tbody id="results-tbody">
        <tr><td colspan="4" style="text-align:center;color:var(--subtle);padding:20px;font-family:var(--mono);font-size:11px;">No completions yet</td></tr>
      </tbody>
    </table>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="assets/js/firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp(SHADE_FIREBASE_CONFIG);
const db         = firebase.database();
const sessionRef = db.ref('shade/session');
const teamsRef   = db.ref('shade/teams');

const ALL_TEAMS = Array.from({length:12}, (_,i) => `TEAM ${i+1}`);

let session = { isRunning:false, isPaused:false, startedAt:null, pausedElapsed:0, code:'' };
let teams   = {};
let timerInterval = null;
let sortByTime = false;

/* ── FIREBASE ── */
sessionRef.on('value', snap => {
  session = { ...session, ...(snap.val()||{}) };
  updateHeaderUI();
  if (session.isRunning && !session.isPaused) startTick();
});

teamsRef.on('value', snap => {
  teams = snap.val() || {};
  renderTeamPills();
  renderTeamTable();
  renderResults();
});

/* ── TIMER ── */
function startTick() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!session.isRunning || session.isPaused || !session.startedAt) return;
    const el = Date.now() - session.startedAt;
    document.getElementById('header-timer').textContent = formatTime(el);
    // update adj times in table
    document.querySelectorAll('[data-adjtime]').forEach(el2 => {
      const name = el2.dataset.adjtime;
      const t = teams[teamKey(name)];
      if (!t || t.completed) return;
      const adj = el + (t.hintsUsed||0)*60000 + (t.wrongAttempts||0)*30000;
      el2.textContent = formatTime(adj);
      el2.className = 'hidden-time' + (((t.hintsUsed||0)+(t.wrongAttempts||0))>0 ? ' penalised' : '');
    });
  }, 100);
}

/* ── SESSION CONTROLS ── */
function startSession() {
  sessionRef.update({ isRunning:true, isPaused:false, startedAt:Date.now(), pausedElapsed:0 });
  toast('Timer started');
}
function pauseSession() {
  const elapsed = Date.now() - session.startedAt;
  sessionRef.update({ isPaused:true, pausedElapsed:elapsed });
  clearInterval(timerInterval);
  toast('Timer paused');
}
function resumeSession() {
  const newStart = Date.now() - (session.pausedElapsed||0);
  sessionRef.update({ isPaused:false, startedAt:newStart });
  startTick();
  toast('Timer resumed');
}
function confirmReset() {
  if (!confirm('Reset session? All team progress will be cleared.')) return;
  clearInterval(timerInterval);
  sessionRef.update({ isRunning:false, isPaused:false, startedAt:null, pausedElapsed:0 });
  // Reset team data
  const updates = {};
  ALL_TEAMS.forEach(name => {
    const k = teamKey(name);
    if (teams[k]) updates[k] = { ...teams[k],
      loggedIn:false, hintsUsed:0, wrongAttempts:0,
      lockoutUntil:null, completed:false, completedAt:null, adjustedCompletionMs:null
    };
  });
  teamsRef.update(updates);
  document.getElementById('header-timer').textContent = '00:00:00';
  document.getElementById('header-timer').className = 'header-timer';
  toast('Session reset');
}
function setCode(v) {
  if (v.length === 4) { sessionRef.update({ code:v }); toast('Code set: '+v); }
}

/* ── HEADER UI ── */
function updateHeaderUI() {
  const t   = document.getElementById('header-timer');
  const bs  = document.getElementById('btn-start');
  const bp  = document.getElementById('btn-pause');
  const br  = document.getElementById('btn-resume');

  if (session.isRunning && !session.isPaused) {
    t.className = 'header-timer running';
    bs.disabled = true;
    bp.disabled = false; bp.style.display = '';
    br.style.display = 'none';
  } else if (session.isPaused) {
    t.className = 'header-timer paused';
    if (session.pausedElapsed) t.textContent = formatTime(session.pausedElapsed);
    bs.disabled = true;
    bp.style.display = 'none';
    br.style.display = '';
  } else {
    t.className = 'header-timer';
    bs.disabled = false;
    bp.disabled = true; bp.style.display = '';
    br.style.display = 'none';
  }
  if (session.code) document.getElementById('code-input').value = session.code;
}

/* ── TEAM PILLS ── */
function renderTeamPills() {
  const row = document.getElementById('add-team-row');
  row.innerHTML = '<span class="add-team-label">Teams:</span>';
  ALL_TEAMS.forEach(name => {
    const enabled = (teams[teamKey(name)]||{}).enabled;
    const btn = document.createElement('button');
    btn.className = 'team-pill-btn' + (enabled ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => toggleTeam(name);
    row.appendChild(btn);
  });
}

/* ── TEAM TABLE ── */
function renderTeamTable() {
  const tbody = document.getElementById('team-tbody');
  const active = ALL_TEAMS.filter(n => (teams[teamKey(n)]||{}).enabled);

  if (!active.length) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No teams added — tap a team above to add</div></td></tr>';
    return;
  }

  tbody.innerHTML = '';
  active.forEach(name => {
    const t = teams[teamKey(name)] || {};
    const hints   = t.hintsUsed || 0;
    const wrong   = t.wrongAttempts || 0;
    const locked  = t.lockoutUntil && Date.now() < t.lockoutUntil;
    const done    = t.completed;
    const loggedIn = t.loggedIn;

    // Status
    let statusHtml;
    if (done)        statusHtml = `<span class="status-badge s-complete"><span class="status-dot"></span>Disarmed</span>`;
    else if (locked) statusHtml = `<span class="status-badge s-locked"><span class="status-dot"></span>Locked</span>`;
    else if (loggedIn) statusHtml = `<span class="status-badge s-active"><span class="status-dot"></span>Active</span>`;
    else             statusHtml = `<span class="status-badge s-waiting">Waiting</span>`;

    // Hint pips
    const pips = [0,1,2].map(i =>
      `<div class="hint-pip ${i < hints ? (hints>=3?'maxed':'used') : ''}"></div>`
    ).join('');

    // Adj time
    const elapsed = session.isRunning && session.startedAt
      ? (session.isPaused ? (session.pausedElapsed||0) : Date.now() - session.startedAt)
      : 0;
    const adjMs = done && t.adjustedCompletionMs != null
      ? t.adjustedCompletionMs
      : elapsed + hints*60000 + wrong*30000;
    const timeClass = done ? 'complete' : (hints>0||wrong>0 ? 'penalised' : '');

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-name">${name}</td>
      <td>${statusHtml}</td>
      <td>
        <div class="hints-cell">
          <div class="hint-pips">${pips}</div>
          <span style="font-family:var(--mono);font-size:12px;color:var(--muted);">${hints}/3</span>
          <button class="btn-hint" onclick="addHint('${name}')" ${hints>=3||done?'disabled':''}>
            + Hint
          </button>
        </div>
      </td>
      <td><div class="wrong-count ${wrong>0?'has-wrongs':''}">${wrong}</div></td>
      <td><div class="hidden-time ${timeClass}" data-adjtime="${name}">${done ? formatTime(adjMs) : formatTime(adjMs)}</div></td>
      <td><button class="btn-remove" onclick="removeTeam('${name}')" title="Remove">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
}

/* ── RESULTS ── */
function renderResults() {
  const tbody = document.getElementById('results-tbody');
  let rows = ALL_TEAMS
    .filter(n => (teams[teamKey(n)]||{}).enabled)
    .map(n => ({ name:n, t:teams[teamKey(n)]||{} }));

  if (sortByTime) {
    rows.sort((a,b) => {
      const am = a.t.adjustedCompletionMs, bm = b.t.adjustedCompletionMs;
      if (am && bm) return am - bm;
      if (am) return -1; if (bm) return 1; return 0;
    });
  }

  const done = rows.filter(r => r.t.completed);
  if (!done.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--subtle);padding:20px;font-family:var(--mono);font-size:11px;">No completions yet</td></tr>`;
    return;
  }

  tbody.innerHTML = '';
  let rank = 1;
  rows.forEach(r => {
    const t = r.t;
    const hints = t.hintsUsed||0;
    const wrong = t.wrongAttempts||0;
    const pen = hints*60 + wrong*30;
    const tr = document.createElement('tr');
    if (t.completed) {
      tr.className = 'done';
      tr.innerHTML = `
        <td class="rank-num">${rank++}</td>
        <td style="font-weight:600">${r.name}</td>
        <td style="color:${pen>0?'var(--red)':'var(--subtle)'};">${pen>0?`+${pen}s`:'None'}</td>
        <td class="completion-time">${t.adjustedCompletionMs ? formatTime(t.adjustedCompletionMs) : '—'}</td>
      `;
    } else {
      tr.innerHTML = `<td>—</td><td>${r.name}</td><td>—</td><td>—</td>`;
    }
    tbody.appendChild(tr);
  });
}
function sortResults() { sortByTime = !sortByTime; renderResults(); }

/* ── TEAM ACTIONS ── */
function toggleTeam(name) {
  const k = teamKey(name);
  const cur = (teams[k]||{}).enabled;
  if (!cur) {
    teamsRef.child(k).set({ teamName:name, enabled:true, loggedIn:false,
      hintsUsed:0, wrongAttempts:0, lockoutUntil:null,
      completed:false, completedAt:null, adjustedCompletionMs:null });
    toast(name + ' added');
  } else {
    teamsRef.child(k).update({ enabled:false, loggedIn:false });
    toast(name + ' removed');
  }
}
function removeTeam(name) { toggleTeam(name); }
function addHint(name) {
  const k = teamKey(name);
  const h = (teams[k]||{}).hintsUsed||0;
  if (h >= 3) return;
  teamsRef.child(k).update({ hintsUsed: h+1 });
  toast(`Hint added to ${name} (+60s)`);
}

/* ── HELPERS ── */
function teamKey(n) { return n.replace(/ /g,'_'); }
function formatTime(ms) {
  if (!ms && ms!==0) return '00:00:00';
  const t = Math.floor(ms/1000);
  const h = Math.floor(t/3600).toString().padStart(2,'0');
  const m = Math.floor((t%3600)/60).toString().padStart(2,'0');
  const s = (t%60).toString().padStart(2,'0');
  return `${h}:${m}:${s}`;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

startTick();
</script>
