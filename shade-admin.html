<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADE — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:       #08090a;
  --surface:  #0e1012;
  --raised:   #141618;
  --panel:    #1c1f22;
  --border:   #2c3035;
  --border2:  #3d4349;
  --text:     #f0ece0;
  --muted:    #adb3ba;
  --ghost:    #555c63;
  --gold:     #c9a84c;
  --gold-dim: #7a6229;
  --red:      #e74c3c;
  --red-dim:  #b03a2e;
  --green:    #27ae60;
  --green-dim:#1a6b3c;
  --cyan:     #00b4d8;
  --cyan-dim: #00607a;
  --mono: 'Courier Prime', monospace;
  --sans: 'Oswald', sans-serif;
}
html,body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }

/* ── TOP BAR ── */
.topbar {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:50;
}
.topbar-logo { display:flex; align-items:center; gap:10px; }
.topbar-logo img { width:36px; height:36px; object-fit:contain; }
.topbar-wordmark { font-size:20px; letter-spacing:0.25em; }
.topbar-label { font-family:var(--mono); font-size:9px; letter-spacing:0.15em; color:var(--gold); text-transform:uppercase; }

.topbar-divider { width:1px; height:36px; background:var(--border); flex-shrink:0; }

/* Universal Timer */
.universal-timer {
  font-family:var(--mono);
  font-size:28px;
  font-weight:700;
  color:var(--text);
  letter-spacing:0.05em;
  min-width:160px;
}
.universal-timer.running { color:var(--green); }
.universal-timer.paused  { color:var(--gold); }

/* Session Controls */
.session-controls { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.btn {
  font-family:var(--sans);
  font-size:13px;
  font-weight:600;
  letter-spacing:0.06em;
  text-transform:uppercase;
  padding:9px 16px;
  border-radius:3px;
  border:1px solid;
  cursor:pointer;
  transition:all 0.12s;
  white-space:nowrap;
}
.btn:disabled { opacity:0.35; cursor:not-allowed; }
.btn-gold  { background:var(--gold);    color:#000; border-color:var(--gold); }
.btn-ghost { background:transparent;   color:var(--muted); border-color:var(--border); }
.btn-red   { background:transparent;   color:var(--red);   border-color:var(--red-dim); }
.btn-green { background:var(--green);  color:#000; border-color:var(--green); }
.btn-cyan  { background:transparent;   color:var(--cyan);  border-color:var(--cyan-dim); }
.btn-sm    { font-size:11px; padding:6px 10px; }

/* Code input */
.code-block { display:flex; align-items:center; gap:10px; margin-left:auto; }
.code-label { font-family:var(--mono); font-size:9px; letter-spacing:0.15em; color:var(--ghost); text-transform:uppercase; }
.code-input {
  background:var(--raised);
  border:1px solid var(--border2);
  border-radius:3px;
  font-family:var(--mono);
  font-size:22px;
  font-weight:700;
  letter-spacing:0.3em;
  color:var(--gold);
  width:90px;
  text-align:center;
  padding:8px 4px;
}
.code-input:focus { outline:none; border-color:var(--gold); }

/* ── MAIN LAYOUT ── */
.main { padding:20px; display:flex; flex-direction:column; gap:20px; }

/* Section headers */
.section-head {
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:0.25em;
  color:var(--gold-dim);
  text-transform:uppercase;
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

/* ── TEAM GRID ── */
.team-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:12px;
}

.team-card {
  background:var(--raised);
  border:1px solid var(--border);
  border-radius:4px;
  overflow:hidden;
  transition:border-color 0.2s;
}
.team-card.disabled { opacity:0.4; }
.team-card.completed { border-color:var(--green-dim); }
.team-card.locked    { border-color:var(--red-dim); }
.team-card.active    { border-color:var(--border2); }

.card-header {
  background:var(--panel);
  padding:10px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.card-team-name {
  font-size:15px;
  font-weight:600;
  letter-spacing:0.1em;
}
.card-status {
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  padding:3px 8px;
  border-radius:2px;
  border:1px solid;
}
.status-waiting    { color:var(--ghost);  border-color:var(--border);   background:transparent; }
.status-active     { color:var(--cyan);   border-color:var(--cyan-dim); background:#001a1f; }
.status-locked     { color:var(--red);    border-color:var(--red-dim);  background:#1a0505; }
.status-completed  { color:var(--green);  border-color:var(--green-dim);background:#041208; }
.status-disabled   { color:var(--ghost);  border-color:var(--border);   background:transparent; }

.card-body { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }

.card-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }

.card-metric-label {
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:0.12em;
  color:var(--ghost);
  text-transform:uppercase;
}
.card-metric-value {
  font-family:var(--mono);
  font-size:13px;
  color:var(--text);
}
.card-metric-value.highlight { color:var(--gold); }
.card-metric-value.red       { color:var(--red); }
.card-metric-value.green     { color:var(--green); }

/* Hidden time — bigger, prominent */
.hidden-time-block {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:3px;
  padding:8px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.hidden-time-label {
  font-family:var(--mono);
  font-size:8px;
  letter-spacing:0.15em;
  color:var(--gold-dim);
  text-transform:uppercase;
}
.hidden-time-value {
  font-family:var(--mono);
  font-size:18px;
  font-weight:700;
  color:var(--gold);
  letter-spacing:0.05em;
}

/* Hint controls */
.hint-row { display:flex; align-items:center; gap:10px; }
.hint-pips { display:flex; gap:4px; }
.hint-pip {
  width:10px; height:10px;
  border-radius:50%;
  border:1px solid var(--border2);
  background:transparent;
}
.hint-pip.used { background:var(--gold); border-color:var(--gold); }
.hint-pip.maxed { background:var(--red);  border-color:var(--red); }

/* Toggle */
.toggle-btn {
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:4px 10px;
  border-radius:2px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  transition:all 0.12s;
}
.toggle-btn.on  { border-color:var(--green-dim); color:var(--green); }
.toggle-btn.off { border-color:var(--border);    color:var(--ghost); }

/* ── SCOREBOARD ── */
.scoreboard { overflow-x:auto; }
.scoreboard table {
  width:100%;
  border-collapse:collapse;
  font-family:var(--mono);
  font-size:13px;
}
.scoreboard th {
  text-align:left;
  padding:8px 12px;
  font-size:9px;
  letter-spacing:0.15em;
  color:var(--ghost);
  text-transform:uppercase;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  cursor:pointer;
  user-select:none;
}
.scoreboard th:hover { color:var(--gold); }
.scoreboard td {
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  color:var(--muted);
}
.scoreboard tr.completed td { color:var(--text); }
.scoreboard tr.completed td:first-child { color:var(--green); }
.scoreboard .rank { color:var(--gold); font-weight:700; }

/* Badge */
.badge {
  display:inline-block;
  font-family:var(--mono);
  font-size:8px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:2px 7px;
  border-radius:2px;
  border:1px solid;
}
.badge-green { color:var(--green); border-color:var(--green-dim); background:#041208; }
.badge-gold  { color:var(--gold);  border-color:var(--gold-dim);  background:#1a1200; }
.badge-ghost { color:var(--ghost); border-color:var(--border);    background:transparent; }

/* Notification toast */
.toast {
  position:fixed;
  bottom:24px;
  right:24px;
  background:var(--panel);
  border:1px solid var(--border2);
  border-radius:4px;
  padding:12px 20px;
  font-family:var(--mono);
  font-size:13px;
  color:var(--text);
  z-index:200;
  opacity:0;
  transform:translateY(8px);
  transition:all 0.25s;
  pointer-events:none;
}
.toast.show { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">
    <img src="assets/img/shade-seal.png" alt="SHADE">
    <div>
      <div class="topbar-wordmark">SHADE</div>
      <div class="topbar-label">Admin Panel</div>
    </div>
  </div>

  <div class="topbar-divider"></div>

  <div class="universal-timer" id="universal-timer">00:00:00.000</div>

  <div class="session-controls">
    <button class="btn btn-gold"  id="btn-start"  onclick="startSession()">▶ Start</button>
    <button class="btn btn-ghost" id="btn-pause"  onclick="pauseSession()"  disabled>⏸ Pause</button>
    <button class="btn btn-ghost" id="btn-resume" onclick="resumeSession()" disabled style="display:none">▶ Resume</button>
    <button class="btn btn-red"   id="btn-reset"  onclick="confirmReset()">↺ Reset</button>
  </div>

  <div class="code-block">
    <div class="code-label">Disarm Code</div>
    <input class="code-input" id="code-input" type="text" maxlength="4"
           placeholder="0000" oninput="setCode(this.value)" onkeypress="return /[0-9]/.test(event.key)">
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TEAMS -->
  <div>
    <div class="section-head">Teams — Active Session</div>
    <div class="team-grid" id="team-grid"></div>
  </div>

  <!-- SCOREBOARD -->
  <div>
    <div class="section-head" style="display:flex;justify-content:space-between;align-items:center;">
      <span>Results & Scoreboard</span>
      <button class="btn btn-ghost btn-sm" onclick="sortScoreboard()">Sort by Time</button>
    </div>
    <div class="scoreboard">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Team</th>
            <th>Status</th>
            <th>Hints</th>
            <th>Wrong</th>
            <th>Penalty</th>
            <th>Adj. Time</th>
          </tr>
        </thead>
        <tbody id="scoreboard-body"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="assets/js/firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
/* ── INIT ── */
firebase.initializeApp(SHADE_FIREBASE_CONFIG);
const db = firebase.database();
const sessionRef = db.ref('shade/session');
const teamsRef   = db.ref('shade/teams');

const ALL_TEAMS = Array.from({length:12}, (_,i) => `TEAM ${i+1}`);

/* ── LOCAL STATE ── */
let session = {
  isRunning: false,
  isPaused:  false,
  startedAt: null,
  pausedElapsed: 0,
  code: ''
};
let teams = {};
let timerInterval = null;
let sortByTime = false;

/* ── FIREBASE LISTENERS ── */
sessionRef.on('value', snap => {
  const data = snap.val() || {};
  session = { ...session, ...data };
  updateSessionUI();
});

teamsRef.on('value', snap => {
  teams = snap.val() || {};
  renderTeamGrid();
  renderScoreboard();
});

/* ── TIMER ── */
function startTick() {
  clearInterval(timerInterval);
  timerInterval = setInterval(tickTimer, 50);
}

function tickTimer() {
  if (!session.isRunning || session.isPaused) return;
  const elapsed = Date.now() - session.startedAt;
  document.getElementById('universal-timer').textContent = formatMs(elapsed);
  // Update hidden times per team
  document.querySelectorAll('.hidden-time-value').forEach(el => {
    const name = el.dataset.team;
    if (!name || !teams[teamKey(name)]) return;
    const t = teams[teamKey(name)];
    if (t.completed) return;
    const hidden = elapsed + (t.hintsUsed||0)*60000 + (t.wrongAttempts||0)*30000;
    el.textContent = formatMs(hidden);
  });
}

/* ── SESSION CONTROLS ── */
function startSession() {
  if (session.isRunning) return;
  sessionRef.update({
    isRunning:     true,
    isPaused:      false,
    startedAt:     Date.now(),
    pausedElapsed: 0
  });
  startTick();
  toast('Session started');
}

function pauseSession() {
  if (!session.isRunning || session.isPaused) return;
  const elapsed = Date.now() - session.startedAt;
  sessionRef.update({ isPaused: true, pausedElapsed: elapsed });
  toast('Session paused');
}

function resumeSession() {
  if (!session.isPaused) return;
  const newStart = Date.now() - (session.pausedElapsed || 0);
  sessionRef.update({ isPaused: false, startedAt: newStart });
  startTick();
  toast('Session resumed');
}

function confirmReset() {
  if (!confirm('Reset entire session? All team data will be cleared.')) return;
  clearInterval(timerInterval);
  sessionRef.set({
    isRunning: false, isPaused: false,
    startedAt: null, pausedElapsed: 0,
    code: session.code || ''
  });
  // Reset all teams
  const updates = {};
  ALL_TEAMS.forEach(name => {
    const k = teamKey(name);
    if (teams[k]) {
      updates[k] = { ...teams[k],
        loggedIn:false, hintsUsed:0, wrongAttempts:0,
        lockoutUntil:null, completed:false,
        completedAt:null, adjustedCompletionMs:null
      };
    }
  });
  teamsRef.update(updates);
  document.getElementById('universal-timer').textContent = '00:00:00.000';
  document.getElementById('universal-timer').className = 'universal-timer';
  toast('Session reset');
}

function setCode(val) {
  if (val.length !== 4) return;
  sessionRef.update({ code: val });
  toast(`Disarm code set to ${val}`);
}

/* ── SESSION UI ── */
function updateSessionUI() {
  const timer = document.getElementById('universal-timer');
  const btnStart  = document.getElementById('btn-start');
  const btnPause  = document.getElementById('btn-pause');
  const btnResume = document.getElementById('btn-resume');

  if (session.isRunning && !session.isPaused) {
    timer.className = 'universal-timer running';
    btnStart.disabled  = true;
    btnPause.disabled  = false;
    btnPause.style.display  = '';
    btnResume.style.display = 'none';
    startTick();
  } else if (session.isPaused) {
    timer.className = 'universal-timer paused';
    btnStart.disabled  = true;
    btnPause.style.display  = 'none';
    btnResume.style.display = '';
    btnResume.disabled = false;
    if (session.pausedElapsed) timer.textContent = formatMs(session.pausedElapsed);
  } else {
    timer.className = 'universal-timer';
    btnStart.disabled  = false;
    btnPause.style.display  = '';
    btnResume.style.display = 'none';
    btnPause.disabled  = true;
  }

  if (session.code) {
    document.getElementById('code-input').value = session.code;
  }
}

/* ── TEAM GRID ── */
function renderTeamGrid() {
  const grid = document.getElementById('team-grid');
  grid.innerHTML = '';
  ALL_TEAMS.forEach(name => {
    const k = teamKey(name);
    const t = teams[k] || { enabled:false };
    grid.appendChild(buildTeamCard(name, t));
  });
}

function buildTeamCard(name, t) {
  const enabled   = t.enabled || false;
  const completed = t.completed || false;
  const loggedIn  = t.loggedIn || false;
  const locked    = t.lockoutUntil && Date.now() < t.lockoutUntil;
  const hints     = t.hintsUsed || 0;
  const wrong     = t.wrongAttempts || 0;

  let statusClass = 'status-waiting';
  let statusText  = 'Waiting';
  if (!enabled)   { statusClass='status-disabled'; statusText='Disabled'; }
  else if (completed) { statusClass='status-completed'; statusText='Disarmed'; }
  else if (locked)    { statusClass='status-locked';    statusText='Locked'; }
  else if (loggedIn)  { statusClass='status-active';    statusText='Active'; }

  let cardClass = 'team-card';
  if (!enabled)   cardClass += ' disabled';
  if (completed)  cardClass += ' completed';
  else if (locked) cardClass += ' locked';
  else if (loggedIn) cardClass += ' active';

  // Hidden time
  const elapsed = session.isRunning && session.startedAt
    ? (session.isPaused ? session.pausedElapsed : Date.now() - session.startedAt)
    : 0;
  const hidden = elapsed + hints*60000 + wrong*30000;

  // Completion time
  let adjTimeStr = '—';
  if (completed && t.adjustedCompletionMs != null) {
    adjTimeStr = formatMs(t.adjustedCompletionMs);
  }

  const pip = (i) => `<div class="hint-pip ${i < hints ? (hints>=3?'maxed':'used') : ''}"></div>`;
  const pips = [0,1,2].map(pip).join('');

  const card = document.createElement('div');
  card.className = cardClass;
  card.innerHTML = `
    <div class="card-header">
      <div class="card-team-name">${name}</div>
      <div class="card-status ${statusClass}">${statusText}</div>
    </div>
    <div class="card-body">
      <div class="hidden-time-block">
        <div class="hidden-time-label">Hidden Adj. Time</div>
        <div class="hidden-time-value" data-team="${name}">${completed ? adjTimeStr : formatMs(hidden)}</div>
      </div>
      <div class="card-row">
        <div class="card-metric-label">Hints</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="hint-pips">${pips}</div>
          <span class="card-metric-value">${hints}/3</span>
          <button class="btn btn-cyan btn-sm" onclick="addHint('${name}')" ${hints>=3||completed||!enabled?'disabled':''}>+Hint</button>
        </div>
      </div>
      <div class="card-row">
        <div class="card-metric-label">Wrong Attempts</div>
        <div class="card-metric-value ${wrong>0?'red':''}">${wrong}</div>
      </div>
      <div class="card-row">
        <div class="card-metric-label">Adj. Completion</div>
        <div class="card-metric-value ${completed?'green':''}">${adjTimeStr}</div>
      </div>
      <div class="card-row">
        <div class="card-metric-label">Enable Team</div>
        <button class="toggle-btn ${enabled?'on':'off'}" onclick="toggleTeam('${name}')">
          ${enabled ? 'Enabled' : 'Disabled'}
        </button>
      </div>
    </div>
  `;
  return card;
}

/* ── TEAM ACTIONS ── */
function addHint(name) {
  const k = teamKey(name);
  const t = teams[k] || {};
  const hints = (t.hintsUsed||0);
  if (hints >= 3) return;
  teamsRef.child(k).update({ hintsUsed: hints + 1 });
  toast(`Hint added to ${name} (+60s)`);
}

function toggleTeam(name) {
  const k = teamKey(name);
  const cur = (teams[k] || {}).enabled || false;
  if (!cur) {
    // Enable: initialise team
    teamsRef.child(k).set({
      teamName: name, enabled:true, loggedIn:false,
      hintsUsed:0, wrongAttempts:0, lockoutUntil:null,
      completed:false, completedAt:null, adjustedCompletionMs:null
    });
  } else {
    teamsRef.child(k).update({ enabled:false, loggedIn:false });
  }
}

/* ── SCOREBOARD ── */
function renderScoreboard() {
  const tbody = document.getElementById('scoreboard-body');
  let rows = ALL_TEAMS
    .map(name => ({ name, t: teams[teamKey(name)] || {} }))
    .filter(r => r.t.enabled);

  if (sortByTime) {
    rows.sort((a,b) => {
      const ac = a.t.adjustedCompletionMs;
      const bc = b.t.adjustedCompletionMs;
      if (ac && bc) return ac - bc;
      if (ac) return -1;
      if (bc) return 1;
      return 0;
    });
  }

  tbody.innerHTML = '';
  rows.forEach((r, i) => {
    const t = r.t;
    const done = t.completed;
    const hints = t.hintsUsed || 0;
    const wrong = t.wrongAttempts || 0;
    const penalty = hints*60 + wrong*30;
    const adjMs = t.adjustedCompletionMs;
    const tr = document.createElement('tr');
    if (done) tr.className = 'completed';
    tr.innerHTML = `
      <td class="rank">${done ? i+1 : '—'}</td>
      <td>${r.name}</td>
      <td>${done ? '<span class="badge badge-green">Disarmed</span>' : '<span class="badge badge-ghost">Active</span>'}</td>
      <td>${hints}/3</td>
      <td>${wrong}</td>
      <td>${penalty > 0 ? `+${penalty}s` : '—'}</td>
      <td>${adjMs ? formatMs(adjMs) : '—'}</td>
    `;
    tbody.appendChild(tr);
  });
}

function sortScoreboard() {
  sortByTime = !sortByTime;
  renderScoreboard();
}

/* ── HELPERS ── */
function teamKey(name) { return name.replace(/ /g,'_'); }

function formatMs(ms) {
  if (!ms && ms !== 0) return '00:00:00.000';
  const totalSec = Math.floor(ms / 1000);
  const m = Math.floor(totalSec / 60).toString().padStart(2,'0');
  const s = (totalSec % 60).toString().padStart(2,'0');
  const msStr = (ms % 1000).toString().padStart(3,'0');
  return `${m}:${s}.${msStr}`;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// Kick off tick on load
startTick();
</script>
</body>
</html>
