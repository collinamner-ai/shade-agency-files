<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHADE - Admin Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Oswald', sans-serif;
      background: #000;
      color: #f0ece0;
      padding: 40px 24px;
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .subtitle {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 40px;
    }

    .section {
      margin-bottom: 48px;
      border: 1px solid #222;
      padding: 24px;
      background: #0a0a0a;
    }

    .section h2 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 20px;
      color: #c9a84c;
    }

    .control-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #f0ece0;
      font-family: 'Courier Prime', monospace;
      font-size: 12px;
      border-radius: 2px;
      margin-bottom: 8px;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #c9a84c;
    }

    .btn {
      padding: 12px 24px;
      background: transparent;
      border: 1px solid #333;
      color: #f0ece0;
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .btn:active {
      border-color: #c9a84c;
      color: #c9a84c;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      border-color: #c9a84c;
      color: #c9a84c;
    }

    .btn-primary:active {
      background: rgba(201, 168, 76, 0.1);
    }

    .team-list {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
    }

    @media (max-width: 600px) {
      .team-list {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 400px) {
      .team-list {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .team-item {
      padding: 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 2px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .team-item:active {
      border-color: #c9a84c;
      background: rgba(201, 168, 76, 0.1);
    }

    .team-item.active {
      border-color: #c9a84c;
      color: #c9a84c;
    }

    .status {
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      color: #555;
      margin-top: 12px;
      padding: 12px;
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 2px;
    }

    .status.active {
      color: #c9a84c;
      border-color: #c9a84c;
    }

    .timer-display {
      font-family: 'Courier Prime', monospace;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin: 20px 0;
      color: #c9a84c;
      letter-spacing: 0.1em;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
      body { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<h1>SHADE Admin</h1>
<p class="subtitle">Control Terminal</p>

<!-- TIMER SECTION -->
<div class="section">
  <h2>Universal Timer</h2>
  <div class="timer-display" id="timerDisplay">00:00</div>
  <div class="grid-2">
    <button class="btn btn-primary" onclick="startTimer()">Start</button>
    <button class="btn" onclick="stopTimer()">Stop</button>
  </div>
  <div class="status" id="timerStatus">Stopped</div>
</div>

<!-- DISARM CODE -->
<div class="section">
  <h2>Disarm Code</h2>
  <div class="control-group">
    <label>4-Digit Code</label>
    <input type="text" id="codeInput" placeholder="0000" maxlength="4">
    <button class="btn btn-primary" onclick="saveCode()">Set Code</button>
  </div>
  <div class="status" id="codeStatus">Code: 0000</div>
</div>

<!-- TEAMS -->
<div class="section">
  <h2>Enable Teams</h2>
  <div class="team-list" id="teamList"></div>
</div>

<!-- TEAM STATUS -->
<div class="section">
  <h2>Team Status</h2>
  <div id="teamStatus" style="font-family: 'Courier Prime', monospace; font-size: 11px; color: #888; line-height: 1.8;"></div>
</div>

<script>
const TEAMS = ['TEAM 1', 'TEAM 2', 'TEAM 3', 'TEAM 4', 'TEAM 5', 'TEAM 6', 'TEAM 7', 'TEAM 8', 'TEAM 9', 'TEAM 10', 'TEAM 11', 'TEAM 12'];
let gameState = {
  timerRunning: false,
  timerStart: 0,
  code: '0000',
  enabledTeams: new Set(['TEAM 1', 'TEAM 2']),
  teams: {}
};

TEAMS.forEach(t => {
  gameState.teams[t] = { enabled: false, completed: false, hints: 0, locked: false, lockoutEnd: 0 };
});

// Load from localStorage
function load() {
  const saved = localStorage.getItem('shade-admin');
  if (saved) gameState = JSON.parse(saved);
  else gameState.enabledTeams = new Set(['TEAM 1', 'TEAM 2']);
  gameState.enabledTeams = new Set(gameState.enabledTeams);
}

function save() {
  const toSave = {...gameState, enabledTeams: Array.from(gameState.enabledTeams)};
  localStorage.setItem('shade-admin', JSON.stringify(toSave));
}

function startTimer() {
  gameState.timerRunning = true;
  gameState.timerStart = Date.now();
  save();
  updateTimer();
}

function stopTimer() {
  gameState.timerRunning = false;
  save();
}

function saveCode() {
  const code = document.getElementById('codeInput').value;
  if (code.length === 4 && /^\d{4}$/.test(code)) {
    gameState.code = code;
    save();
    document.getElementById('codeStatus').textContent = `Code: ${code}`;
  }
}

function toggleTeam(team) {
  if (gameState.enabledTeams.has(team)) {
    gameState.enabledTeams.delete(team);
  } else {
    gameState.enabledTeams.add(team);
  }
  save();
  renderTeams();
}

function renderTeams() {
  const list = document.getElementById('teamList');
  list.innerHTML = TEAMS.map(t => `
    <div class="team-item ${gameState.enabledTeams.has(t) ? 'active' : ''}" onclick="toggleTeam('${t}')">
      ${t}
    </div>
  `).join('');
}

function updateTimer() {
  const display = document.getElementById('timerDisplay');
  const status = document.getElementById('timerStatus');
  
  if (gameState.timerRunning) {
    const elapsed = Math.floor((Date.now() - gameState.timerStart) / 1000);
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    display.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    status.classList.add('active');
    status.textContent = 'Running';
    requestAnimationFrame(updateTimer);
  } else {
    display.textContent = '00:00';
    status.classList.remove('active');
    status.textContent = 'Stopped';
  }
}

function updateTeamStatus() {
  const status = document.getElementById('teamStatus');
  let html = '';
  TEAMS.forEach(t => {
    const team = gameState.teams[t];
    const enabled = gameState.enabledTeams.has(t) ? '✓' : ' ';
    html += `[${enabled}] ${t} | Completed: ${team.completed ? 'YES' : 'NO'} | Hints: ${team.hints}/3<br>`;
  });
  status.innerHTML = html;
}

// Sync admin pages
window.addEventListener('storage', () => {
  load();
  renderTeams();
  updateTeamStatus();
});

// Init
load();
document.getElementById('codeInput').value = gameState.code;
renderTeams();
updateTeamStatus();
setInterval(updateTeamStatus, 500);
</script>

</body>
</html>
