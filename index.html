<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SHADE · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  min-height:100vh;
  background:#0a0b0c;
  color:#f0ece0;
  font-family:'Oswald', sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
}

.page {
  width:100%;
  max-width:520px;
  padding:48px 32px max(48px, env(safe-area-inset-bottom, 48px));
  padding-top:max(48px, env(safe-area-inset-top, 48px));
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:36px;
}

.header { display:flex; flex-direction:column; align-items:center; gap:14px; }
.header img { width:200px; height:200px; object-fit:contain; }
.header-name { font-size:28px; font-weight:700; letter-spacing:0.25em; text-align:center; }
.header-ref  { font-family:'Courier Prime', monospace; font-size:10px; letter-spacing:0.25em; text-transform:uppercase; color:#c9a84c; text-align:center; }

.divider { width:100%; height:1px; background:linear-gradient(to right, transparent, #2c3035, transparent); }

.btn-grid { display:flex; flex-direction:column; gap:10px; width:100%; }

.btn-link {
  display:flex; align-items:center; justify-content:space-between;
  width:100%; padding:18px 22px;
  background:#141618; border:1px solid #2c3035; border-radius:4px;
  font-family:'Oswald', sans-serif; font-size:17px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase; color:#f0ece0;
  text-decoration:none; cursor:pointer; transition:border-color 0.15s, background 0.15s;
}
.btn-link:hover  { background:#1c1f22; border-color:#c9a84c; }
.btn-label { flex:1; }
.btn-arrow { color:#444; font-size:20px; flex-shrink:0; }

/* ── WIDE (tablet / laptop) ── */
@media (min-width: 700px) {
  .page { max-width:860px; flex-direction:row; align-items:center; gap:64px; padding:60px 60px; }
  .header { flex-shrink:0; width:240px; }
  .header img { width:220px; height:220px; }
  .header-name { font-size:34px; }
  .divider { display:none; }
  .vsep { display:block !important; width:1px; height:300px; background:linear-gradient(to bottom, transparent, #2c3035, transparent); flex-shrink:0; }
  .btn-grid { gap:12px; }
  .btn-link { font-size:18px; padding:20px 24px; }
}

@media (min-width:1100px) {
  .page { gap:80px; padding:60px 80px; }
  .header img { width:190px; height:190px; }
  .btn-link { font-size:20px; padding:22px 28px; }
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <img src="assets/img/shade-seal.png" alt="SHADE Seal">
    <div class="header-name">SHADE</div>
    <div class="header-ref">Admin Access</div>
  </div>

  <div class="divider"></div>
  <div class="vsep" style="display:none"></div>

  <div class="btn-grid">
    <a class="btn-link" href="clue-env-1.html">
      <span class="btn-label">Evidence 1</span>
      <span class="btn-arrow">›</span>
    </a>
    <a class="btn-link" href="clue-env-2.html">
      <span class="btn-label">Evidence 2</span>
      <span class="btn-arrow">›</span>
    </a>
    <a class="btn-link" href="final-disarm.html">
      <span class="btn-label">Final Code</span>
      <span class="btn-arrow">›</span>
    </a>
    <a class="btn-link" href="shade-admin.html">
      <span class="btn-label">Admin Panel</span>
      <span class="btn-arrow">›</span>
    </a>
  </div>

</div>
</body>
</html>
